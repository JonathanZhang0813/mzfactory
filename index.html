<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帽子生成器 - 自动去白边版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f5f0e8 0%, #e8e0d5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255, 248, 235, 0.95);
            border-radius: 64px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 245, 215, 0.6);
            padding: 30px 28px 38px;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            color: #4a3728;
        }
        .rule-badge {
            background: #efe1cf;
            border-radius: 60px;
            padding: 10px 18px;
            display: inline-flex;
            gap: 24px;
            margin-bottom: 28px;
            justify-content: center;
            width: 100%;
        }
        .rule-badge div {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 5px 18px;
            border-radius: 40px;
        }
        .rule-badge kbd {
            background: #2c2c2c;
            color: #ffecb3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .preview-area {
            background: #fef7e9;
            border-radius: 48px;
            padding: 32px 20px;
            margin: 20px 0;
            box-shadow: inset 0 1px 6px rgba(90, 50, 25, 0.08), 0 10px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 280px;
        }
        .hat-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;  /* 关键：0间距 */
        }
        .hat-stack img {
            display: block;
            /* 不设固定宽度，让图片按原始比例显示 */
            height: auto;
            object-fit: contain;
        }
        .input-group {
            margin: 20px 0 12px;
        }
        textarea {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.6rem;
            font-family: monospace;
            border: 3px solid #ddbc94;
            border-radius: 56px;
            background: white;
            resize: vertical;
            text-align: center;
            font-weight: bold;
            letter-spacing: 4px;
            color: #3e2a1f;
            outline: none;
        }
        textarea:focus {
            border-color: #b97f44;
            box-shadow: 0 0 0 3px rgba(185, 127, 68, 0.3);
        }
        .button-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            background: #5d3a1f;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
        }
        button:hover {
            background: #7e4f2c;
            transform: scale(0.97);
        }
        .reset-btn {
            background: #b48b5a;
        }
        .download-btn {
            background: #2c6e2c;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #ac8e6f;
            margin-top: 24px;
        }
        .error-msg {
            color: #c2571a;
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .loading-tip {
            color: #b87333;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎩 帽子生成器 🧢</h1>
    <div style="text-align: center;">
        <div class="rule-badge">
            <div><kbd>帽</kbd> 帽筒</div>
            <div><kbd>子</kbd> 帽沿</div>
        </div>
    </div>

    <div class="preview-area">
        <div id="hatContainer" class="hat-stack">
            <div class="loading-tip">✨ 输入「帽子」试试 ✨</div>
        </div>
    </div>

    <div class="input-group">
        <textarea id="hatInput" rows="2" placeholder="例如：帽子  或  帽帽帽子子">帽子</textarea>
    </div>

    <div class="button-bar">
        <button id="generateBtn">✨ 生成帽子</button>
        <button id="resetBtn" class="reset-btn">🗑️ 清空</button>
        <button id="downloadBtn" class="download-btn">📸 下载图片</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <footer>帽筒和帽沿会自动紧密贴合，不留空隙</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
    const IMAGE_MAP = {
        '帽': 'https://jonathanzhang0813.github.io/mzfactory/m.png',   
        '子': 'https://jonathanzhang0813.github.io/mzfactory/z.png'    
    };

    // 缓存图片的实际内容尺寸（裁剪掉透明边距后）
    const imageContentCache = {};

    // 获取图片实际内容尺寸（去除透明边距）
    function getImageContentSize(imgElement) {
        return new Promise((resolve) => {
            // 创建一个离屏canvas来检测图片的透明边界
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            ctx.drawImage(imgElement, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            let top = canvas.height;
            let bottom = 0;
            let left = canvas.width;
            let right = 0;
            
            // 遍历像素，找到非透明区域的范围
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 10) { // 不是透明像素
                        if (x < left) left = x;
                        if (x > right) right = x;
                        if (y < top) top = y;
                        if (y > bottom) bottom = y;
                    }
                }
            }
            
            resolve({
                width: right - left + 1,
                height: bottom - top + 1,
                topOffset: top,
                leftOffset: left
            });
        });
    }

    // 加载图片并自动裁剪透明边距
    function loadAndCropImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; // 处理跨域
            img.onload = async () => {
                try {
                    const contentSize = await getImageContentSize(img);
                    
                    // 创建裁剪后的canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = contentSize.width;
                    canvas.height = contentSize.height;
                    const ctx = canvas.getContext('2d');
                    
                    // 将图片的可见区域绘制到新canvas
                    ctx.drawImage(
                        img,
                        contentSize.leftOffset, contentSize.topOffset,
                        contentSize.width, contentSize.height,
                        0, 0,
                        contentSize.width, contentSize.height
                    );
                    
                    const croppedImg = new Image();
                    croppedImg.src = canvas.toDataURL('image/png');
                    croppedImg.onload = () => resolve(croppedImg);
                } catch (e) {
                    reject(e);
                }
            };
            img.onerror = reject;
            img.src = url;
        });
    }

    // 预加载并裁剪两张图片
    let croppedImages = {
        '帽': null,
        '子': null
    };
    let imagesReady = false;

    async function preloadImages() {
        try {
            croppedImages['帽'] = await loadAndCropImage(IMAGE_MAP['帽']);
            croppedImages['子'] = await loadAndCropImage(IMAGE_MAP['子']);
            imagesReady = true;
            // 如果当前有输入，重新渲染
            if (inputTextarea.value.trim()) {
                generateHat();
            }
        } catch (e) {
            console.error('图片加载失败', e);
            errorMsgDiv.innerText = '图片加载失败，请检查网络或图片地址';
        }
    }

    const inputTextarea = document.getElementById('hatInput');
    const generateBtn = document.getElementById('generateBtn');
    const resetBtn = document.getElementById('resetBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const hatContainer = document.getElementById('hatContainer');
    const errorMsgDiv = document.getElementById('errorMsg');

    // 核心渲染函数 - 使用裁剪后的图片，紧密堆叠
    function renderHatFromText(text) {
        if (!imagesReady) {
            hatContainer.innerHTML = '<div class="loading-tip">⏳ 图片加载中，请稍候...</div>';
            return;
        }

        const chars = text.split('');
        const validChars = chars.filter(ch => ch === '帽' || ch === '子');
        
        if (validChars.length === 0) {
            hatContainer.innerHTML = '<div class="loading-tip">🍂 至少输入一个「帽」或「子」</div>';
            return;
        }

        // 找出一组图片中的最大宽度，统一缩放比例（可选）
        let maxWidth = 0;
        for (const ch of validChars) {
            const img = croppedImages[ch];
            if (img && img.naturalWidth > maxWidth) {
                maxWidth = img.naturalWidth;
            }
        }
        
        // 设定目标显示宽度（最大200px，同时保持比例）
        const targetDisplayWidth = Math.min(maxWidth, 200);
        
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < validChars.length; i++) {
            const ch = validChars[i];
            const croppedImg = croppedImages[ch];
            if (!croppedImg) continue;
            
            // 复制图片节点（因为同一个img不能重复append）
            const clonedImg = croppedImg.cloneNode(true);
            clonedImg.style.display = 'block';
            clonedImg.style.margin = '0 auto';
            // 统一宽度，高度自适应，确保对齐
            clonedImg.style.width = targetDisplayWidth + 'px';
            clonedImg.style.height = 'auto';
            
            fragment.appendChild(clonedImg);
        }
        
        hatContainer.innerHTML = '';
        hatContainer.appendChild(fragment);
    }

    function generateHat() {
        let rawText = inputTextarea.value;
        if (!rawText.trim()) {
            errorMsgDiv.innerText = '❓ 请在输入框里写点什么～ 例如「帽子」';
            return;
        }
        errorMsgDiv.innerText = '';
        renderHatFromText(rawText);
    }

    function resetAll() {
        inputTextarea.value = '';
        hatContainer.innerHTML = '<div class="loading-tip">✨ 输入「帽子」试试 ✨</div>';
        errorMsgDiv.innerText = '';
    }

    async function downloadAsImage() {
        const previewDiv = document.querySelector('.preview-area');
        if (!previewDiv) return;
        
        try {
            const canvas = await html2canvas(previewDiv, {
                backgroundColor: '#fef7e9',
                scale: 2,
                logging: false,
                useCORS: true,
                allowTaint: false
            });
            const link = document.createElement('a');
            link.download = 'my_hat.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            errorMsgDiv.innerText = '✅ 图片已下载！';
            setTimeout(() => {
                if (errorMsgDiv.innerText === '✅ 图片已下载！') errorMsgDiv.innerText = '';
            }, 2000);
        } catch (err) {
            console.error(err);
            errorMsgDiv.innerText = '❌ 截图失败，可能是图片跨域问题';
        }
    }

    generateBtn.addEventListener('click', generateHat);
    resetBtn.addEventListener('click', resetAll);
    downloadBtn.addEventListener('click', downloadAsImage);
    
    // 开始预加载图片
    preloadImages();
    
    window.addEventListener('DOMContentLoaded', () => {
        inputTextarea.value = '帽子';
        // 等待图片加载完成后自动生成
        const checkReady = setInterval(() => {
            if (imagesReady) {
                generateHat();
                clearInterval(checkReady);
            }
        }, 100);
    });
</script>
</body>
</html>
